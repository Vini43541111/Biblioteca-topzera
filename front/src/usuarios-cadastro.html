<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiblioTech - Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-book-half me-2"></i>BiblioTech</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Início/Catálogo</a></li>
                    <li class="nav-item"><a class="nav-link" href="usuarios-lista.html">Listar Usuários</a></li>
                    <li class="nav-item"><a class="nav-link active" href="usuarios-cadastro.html">Novo Usuário</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div id="alerta"></div>
                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white py-3">
                        <h5 class="mb-0">Dados do Novo Usuário</h5>
                    </div>
                    <div class="card-body p-4">
                        <form id="formUsuario">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Nome</label>
                                <input id="nome" name="nome" type="text" class="form-control" required placeholder="Nome completo">
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Matrícula</label>
                                    <input id="matricula" name="matricula" type="text" class="form-control" required placeholder="Apenas números">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Perfil</label>
                                    <select id="perfil" name="perfil" class="form-select">
                                        <option value="0">Leitor</option>
                                        <option value="1">Bibliotecário</option>
                                        <option value="2">Administrador</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">E-mail</label>
                                <input id="email" name="email" type="email" class="form-control" required placeholder="exemplo@gmail.com">
                            </div>
                            <hr>
                            <div class="d-flex justify-content-between">
                                <a href="usuarios-lista.html" class="btn btn-link text-muted">Voltar para a lista</a>
                                <button id="btnSalvar" type="submit" class="btn btn-primary px-5">Cadastrar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000';

        function alerta(html, tipo = 'danger') {
            document.getElementById('alerta').innerHTML = `<div class="alert alert-${tipo} alert-dismissible fade show">${html}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
        }

        document.getElementById('formUsuario').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            btn.disabled = true;
            btn.textContent = 'Salvando...';

            const corpo = {
                nome: document.getElementById('nome').value.trim(),
                matricula: document.getElementById('matricula').value.trim(),
                email: document.getElementById('email').value.trim(),
                perfil: parseInt(document.getElementById('perfil').value, 10),
                status: 1
            };

            try {
                const resp = await fetch(`${API}/usuario`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(corpo)
                });
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                window.location.href = 'usuarios-lista.html';
            } catch (err) {
                alerta('Falha ao cadastrar: ' + err.message + '. API rodando em ' + API + '?');
                btn.disabled = false;
                btn.textContent = 'Cadastrar';
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
