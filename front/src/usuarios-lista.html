<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiblioTech - Usuários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-book-half me-2"></i>BiblioTech</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Início/Catálogo</a></li>
                    <li class="nav-item"><a class="nav-link active" href="usuarios-lista.html">Listar Usuários</a></li>
                    <li class="nav-item"><a class="nav-link" href="usuarios-cadastro.html">Novo Usuário</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div id="alerta"></div>
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                <h4 class="mb-0 text-primary">Usuários Cadastrados</h4>
                <a href="usuarios-cadastro.html" class="btn btn-success"><i class="bi bi-plus-circle me-2"></i>Novo Usuário</a>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Nome</th>
                            <th>Matrícula</th>
                            <th>Email</th>
                            <th>Perfil</th>
                            <th class="text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyUsuarios">
                        <tr><td colspan="6" class="text-center text-muted py-4">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000';
        const PERFIS = { 0: 'Leitor', 1: 'Bibliotecário', 2: 'Administrador' };

        function alerta(html, tipo = 'danger') {
            document.getElementById('alerta').innerHTML = `<div class="alert alert-${tipo} alert-dismissible fade show">${html}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
        }

        async function carregar() {
            const tbody = document.getElementById('tbodyUsuarios');
            try {
                const resp = await fetch(`${API}/usuario`);
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const usuarios = await resp.json();
                if (!usuarios.length) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">Nenhum usuário cadastrado.</td></tr>';
                    return;
                }
                tbody.innerHTML = usuarios.map(u => `
                    <tr>
                        <td class="ps-4">${u.idusuario}</td>
                        <td>${u.nome || ''}</td>
                        <td><code>${u.matricula || ''}</code></td>
                        <td>${u.email || ''}</td>
                        <td>${PERFIS[u.perfil] ?? u.perfil}</td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-outline-danger" onclick="excluir(${u.idusuario})">
                                <i class="bi bi-trash"></i> Excluir
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger py-4">Falha: ${e.message}. API rodando em ${API}?</td></tr>`;
            }
        }

        async function excluir(id) {
            if (!confirm('Excluir o usuário ' + id + '?')) return;
            try {
                const resp = await fetch(`${API}/usuario/${id}`, { method: 'DELETE' });
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                alerta('Usuário excluído.', 'success');
                carregar();
            } catch (e) {
                alerta('Falha ao excluir: ' + e.message);
            }
        }

        carregar();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
