<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiblioTech - Catálogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-book-half me-2"></i>BiblioTech</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Início/Catálogo</a></li>
                    <li class="nav-item"><a class="nav-link" href="usuarios-lista.html">Listar Usuários</a></li>
                    <li class="nav-item"><a class="nav-link" href="usuarios-cadastro.html">Novo Usuário</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-collection me-2"></i>Nosso Acervo</h2>
            <div class="input-group w-50">
                <input id="busca" type="text" class="form-control" placeholder="Pesquisar por título, autor ou categoria...">
                <button id="btnBusca" class="btn btn-primary"><i class="bi bi-search"></i></button>
            </div>
        </div>

        <div id="estado" class="text-center text-muted my-4">Carregando obras...</div>
        <div id="catalogo" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-3 g-4"></div>
    </div>

    <script>
        const API = 'http://localhost:3000';
        let obras = [];

        async function carregarObras() {
            const estado = document.getElementById('estado');
            const catalogo = document.getElementById('catalogo');
            estado.textContent = 'Carregando obras...';
            catalogo.innerHTML = '';
            try {
                const resp = await fetch(`${API}/obra`);
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                obras = await resp.json();
                estado.textContent = '';
                renderizar(obras);
            } catch (e) {
                estado.innerHTML = `<div class="alert alert-danger">Falha ao carregar obras: ${e.message}. A API esta rodando em ${API}?</div>`;
            }
        }

        function renderizar(lista) {
            const catalogo = document.getElementById('catalogo');
            if (!lista.length) {
                catalogo.innerHTML = '<div class="col-12 text-center text-muted">Nenhuma obra encontrada.</div>';
                return;
            }
            catalogo.innerHTML = lista.map(o => `
                <div class="col">
                    <div class="card h-100 shadow-sm border-0">
                        <img src="${o.foto || ''}" class="card-img-top p-3" alt="${o.titulo}" onerror="this.style.display='none'">
                        <div class="card-body">
                            <span class="badge bg-primary mb-2">${o.categoria || ''}</span>
                            <h5 class="card-title h6 text-truncate">${o.titulo || ''}</h5>
                            <p class="card-text small text-muted">${o.autor || ''}<br><small>${o.editora || ''} (${o.publicacao || ''})</small></p>
                        </div>
                        <div class="card-footer bg-white border-0 pb-3">
                            <button class="btn btn-outline-primary btn-sm w-100">Disponibilidade</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filtrar() {
            const termo = document.getElementById('busca').value.toLowerCase().trim();
            if (!termo) return renderizar(obras);
            const filtradas = obras.filter(o =>
                (o.titulo || '').toLowerCase().includes(termo) ||
                (o.autor || '').toLowerCase().includes(termo) ||
                (o.categoria || '').toLowerCase().includes(termo)
            );
            renderizar(filtradas);
        }

        document.getElementById('btnBusca').addEventListener('click', filtrar);
        document.getElementById('busca').addEventListener('keyup', e => { if (e.key === 'Enter') filtrar(); });
        carregarObras();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
